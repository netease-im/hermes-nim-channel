name: hermes-nim-channel
label: NIM
kind: platform
version: 0.2.0
description: >
  Hermes Agent platform plugin for NetEase IM (NIM, 网易云信).
  Uses a Python adapter plus a Node bridge backed by @yxim/nim-bot.
author: Xumengxiang
requires_env:
  - name: NIM_CREDENTIALS
    description: "NIM credentials in appKey|accid|token format"
    prompt: "NIM credentials"
    password: true
optional_env:
  - name: NIM_APP_KEY
    description: "NIM App Key when not using NIM_CREDENTIALS"
    prompt: "NIM App Key"
    password: false
  - name: NIM_ACCOUNT
    description: "NIM account when not using NIM_CREDENTIALS"
    prompt: "NIM account"
    password: false
  - name: NIM_TOKEN
    description: "NIM token when not using NIM_CREDENTIALS"
    prompt: "NIM token"
    password: true
  - name: NIM_ALLOWED_USERS
    description: "Comma-separated direct-message allowlist"
    prompt: "Allowed users"
    password: false
  - name: NIM_ALLOW_ALL_USERS
    description: "Allow all direct-message senders"
    prompt: "Allow all users"
    password: false
  - name: NIM_GROUP_POLICY
    description: "Team message policy: open, allowlist, or disabled"
    prompt: "Team policy"
    password: false
  - name: NIM_GROUP_ALLOWLIST
    description: "Comma-separated allowed team IDs"
    prompt: "Allowed team IDs"
    password: false
  - name: NIM_P2P_POLICY
    description: "P2P policy: open, allowlist, or disabled"
    prompt: "P2P policy"
    password: false
  - name: NIM_P2P_ALLOW_FROM
    description: "Comma-separated P2P applicant/sender allowlist"
    prompt: "P2P allowlist"
    password: false
  - name: NIM_QCHAT_POLICY
    description: "QChat policy: open, allowlist, or disabled"
    prompt: "QChat policy"
    password: false
  - name: NIM_QCHAT_ALLOW_FROM
    description: "Comma-separated QChat allowlist entries"
    prompt: "QChat allowlist"
    password: false
  - name: NIM_WEBLBS_URL
    description: "Private deployment LBS URL"
    prompt: "Private LBS URL"
    password: false
  - name: NIM_LINK_WEB
    description: "Private deployment link URL"
    prompt: "Private link URL"
    password: false
  - name: NIM_NOS_UPLOADER
    description: "Private deployment NOS upload URL"
    prompt: "NOS upload URL"
    password: false
  - name: NIM_NOS_DOWNLOADER_V2
    description: "Private deployment NOS download URL format"
    prompt: "NOS download URL"
    password: false
  - name: NIM_NOS_SSL
    description: "Whether private NOS download uses HTTPS"
    prompt: "NOS SSL"
    password: false
  - name: NIM_NOS_ACCELERATE
    description: "Private deployment NOS accelerate URL format"
    prompt: "NOS accelerate URL"
    password: false
  - name: NIM_NOS_ACCELERATE_HOST
    description: "Private deployment NOS accelerate host"
    prompt: "NOS accelerate host"
    password: false
  - name: NIM_HOME_CHANNEL
    description: "Default NIM target for proactive delivery"
    prompt: "Home channel"
    password: false
  - name: NIM_BRIDGE_COMMAND
    description: "Override the bridge command"
    prompt: "Bridge command"
    password: false
